        body::after {
            content: '';

            top: 0;
            left: 0;

        .ldr-sticker {

            padding: 12px 16px;

            direction: ltr;
            margin-left: auto;
            transform-origin: top right;
            min-height: 64px;
            align-items: center;

            height: 3.6rem;

            display: block;

        .octo-white,
        .octo-green,
        .octo-blue {
            filter: none;
            opacity: 0.95;
        }

        .glitch-octo-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            mix-blend-mode: screen;
            will-change: transform, opacity, filter;
            z-index: 5;
        }
        .glitch-octo-layer img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

            justify-content: center;

        .glitch-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            mix-blend-mode: screen;
            will-change: transform, opacity, clip-path, filter;

        .noise-overlay {
            position: fixed;

            left: 0;

            height: 100%;

            z-index: 15;
            mix-blend-mode: overlay;

            0% { opacity: 0.35; background-position: 0 0; }
            100% { opacity: 0.5; background-position: 10px 15px; }

            position: fixed;

            left: 0;

        @media (max-width: 480px) {
            .top-bar {

            .icon-button a i,
            .icon-button a img {
                width: 2rem;
                height: 2rem;
            }
            .icon-button a i {
                font-size: 2rem;
            }
        }

(function() {
    let effectsEnabled = false;

    const container = document.getElementById('glitchContainer');
    const originalLogo = document.getElementById('baseLogo');
    const octopusContainer = document.getElementById('singularOctopus');
    const triggerLogo = document.getElementById('baseLogo');

    const rand = (min, max) => min + Math.random() * (max - min);
    const randInt = (min, max) => Math.floor(rand(min, max + 1));

    const glitchEffects = [

        (layer) => { const ct = randInt(5,70); const cb = randInt(30,95); layer.style.clipPath = `polygon(0% ${ct}%, 100% ${ct}%, 100% ${cb}%, 0% ${cb}%)`; layer.style.transform = `translateX(${randInt(-45,45)}px)`; layer.style.filter = `contrast(${rand(1.2,2.5)})`; layer.style.opacity = rand(0.6,1); return 70+randInt(40,100); },
        (layer) => { const cl = randInt(10,80); const cr = randInt(20,90); layer.style.clipPath = `polygon(${cl}% 0%, ${cr}% 0%, ${cr}% 100%, ${cl}% 100%)`; layer.style.transform = `translateY(${randInt(-30,30)}px)`; layer.style.filter = `hue-rotate(${randInt(-180,180)}deg)`; layer.style.opacity = rand(0.5,0.9); return 60+randInt(30,90); },
        (layer) => { layer.style.transform = `scaleX(-1) translateX(${randInt(-50,50)}px) scaleY(${rand(0.6,1.2)})`; layer.style.filter = `blur(${rand(0,3)}px) drop-shadow(${randInt(-8,8)}px ${randInt(-8,8)}px 2px #00f2ff)`; layer.style.opacity = rand(0.4,0.85); return 55+randInt(25,80); },
        (layer) => { const txt = layer.querySelectorAll('.logo-fold, .logo-uantum, .logo-it'); txt.forEach(b=>{ b.style.letterSpacing=`${randInt(-5,12)}px`; b.style.transform=`translateY(${randInt(-12,12)}px)`; }); const ic = layer.querySelector('.adk-gye-nyame'); if(ic) ic.style.transform = `rotate(${randInt(-15,15)}deg) scale(${rand(0.7,1.3)})`; layer.style.transform = `skewX(${rand(-20,20)}deg)`; layer.style.filter = `brightness(${rand(0.5,1.8)})`; layer.style.opacity = rand(0.6,1); return 80+randInt(40,120); },
        (layer) => { layer.style.textShadow = `${randInt(-12,12)}px ${randInt(-6,6)}px 0px #ff00cc, ${randInt(-12,12)}px ${randInt(-6,6)}px 0px #00ffff`; layer.style.transform = `translate(${randInt(-15,15)}px,${randInt(-12,12)}px) rotate(${randInt(-3,3)}deg)`; layer.style.filter = `contrast(${rand(1.2,2)}) saturate(${rand(1.5,3)})`; layer.style.opacity = rand(0.5,0.95); return 65+randInt(30,90); },
        (layer) => { layer.style.filter = `blur(${rand(0.8,5)}px) contrast(${rand(1.5,3)})`; layer.style.transform = `translate(${randInt(-25,25)}px,${randInt(-20,20)}px) scale(${rand(0.8,1.2)})`; layer.style.opacity = rand(0.3,0.8); return 40+randInt(30,70); },
        (layer) => { layer.style.transform = `translate(${randInt(-40,40)}px,${randInt(-20,20)}px) skew(${rand(-15,15)}deg,${rand(-10,10)}deg)`; layer.style.filter = `hue-rotate(${randInt(-90,90)}deg) invert(${rand(0.2,0.6)})`; layer.style.opacity = rand(0.5,0.9); return 70+randInt(50,100); }
    ];

    function clearAllLayers() {
        document.querySelectorAll('.glitch-layer').forEach(l => l.remove());
    }

    function createGlitchLayer() {
        const c = originalLogo.cloneNode(true);
        c.style.position = 'absolute';
        c.style.top = '0';
        c.style.left = '0';
        c.style.margin = '0';
        c.style.padding = '0';
        c.style.background = 'transparent';
        c.style.backdropFilter = 'none';
        c.classList.add('glitch-layer');
        container.appendChild(c);
        return c;
    }

    let glitchTimeout = null;
    let microGlitchInterval = null;
    let extraGlitchInterval = null;

    function applyRandomGlitch() {
        if (!effectsEnabled) return;
        clearAllLayers();

        const cnt = randInt(1, 3);
        for (let i = 0; i < cnt; i++) {
            const l = createGlitchLayer();
            const e = glitchEffects[randInt(0, glitchEffects.length - 1)];
            const d = e(l);
            const bm = ['screen', 'lighten', 'difference', 'exclusion', 'color-dodge'];
            l.style.mixBlendMode = bm[randInt(0, bm.length - 1)];
            setTimeout(() => { if (l.parentNode) l.remove(); }, d);
        }

        if (Math.random() < 0.4 && effectsEnabled) {
            const fd = document.createElement('div');
            fd.classList.add('flash');
            document.body.appendChild(fd);
            setTimeout(() => fd.remove(), 80);
        }

        if (Math.random() < 0.5 && effectsEnabled) {
            container.style.filter = `blur(${rand(0.5,3)}px) contrast(${rand(1.2,2.5)}) hue-rotate(${randInt(-40,40)}deg)`;
            setTimeout(() => { container.style.filter = ''; }, randInt(50,150));
        }

        glitchTimeout = setTimeout(() => applyRandomGlitch(), randInt(80, 650));
    }

    function microGlitchBase() {
        if (!effectsEnabled) return;
        if (Math.random() < 0.3) {
            const sx = randInt(-8,8);
            const sy = randInt(-6,6);
            originalLogo.style.transform = `translate(${sx}px,${sy}px)`;
            originalLogo.style.filter = `blur(${rand(0,1.5)}px)`;
            setTimeout(() => {
                originalLogo.style.transform = '';
                originalLogo.style.filter = '';
            }, randInt(30,100));
        }
    }

    function startMicroGlitch() {
        if (microGlitchInterval) clearInterval(microGlitchInterval);
        microGlitchInterval = setInterval(() => microGlitchBase(), 300);
    }

    function startExtraGlitch() {
        if (extraGlitchInterval) clearInterval(extraGlitchInterval);
        extraGlitchInterval = setInterval(() => {
            if (Math.random() < 0.2 && effectsEnabled) {
                const nl = createGlitchLayer();
                nl.style.background = `repeating-linear-gradient(0deg, rgba(0,255,242,0.2) 0px, rgba(212,175,55,0.2) 2px, transparent 3px, transparent 8px)`;
                nl.style.mixBlendMode = 'overlay';
                nl.style.opacity = '0.5';
                nl.style.transform = `translate(${randInt(-20,20)}px,${randInt(-15,15)}px)`;
                setTimeout(() => { if (nl.parentNode) nl.remove(); }, 80);
            }
        }, 400);
    }

    const variants = [
        { name: 'gold', src: 'https://qfoldit.github.io/assets/iokwa_gold.svg', class: 'octo-gold' },
        { name: 'white', src: 'https://blockchainaccreditive.github.io/css/iokwa.svg', class: 'octo-white' },
        { name: 'green', src: 'https://qfoldit.github.io/assets/iokwa_green.svg', class: 'octo-green' },
        { name: 'blue', src: 'https://qfoldit.github.io/assets/iokwa_blue.svg', class: 'octo-blue' }
    ];

    const gridConfigs = [
        { count: 1, style: 'inline-grid', template: null, gap: 0 },
        { count: 2, style: 'grid', template: 'repeat(2, 1fr)', gap: 8 },
        { count: 2, style: 'grid', template: 'repeat(1, 1fr)', gap: 8, flexDir: 'column' },
        { count: 3, style: 'grid', template: 'repeat(3, 1fr)', gap: 6 },
        { count: 4, style: 'grid', template: 'repeat(2, 1fr)', gap: 8 },
        { count: 4, style: 'grid', template: 'repeat(4, 1fr)', gap: 6 },
        { count: 6, style: 'grid', template: 'repeat(3, 1fr)', gap: 6 },
        { count: 6, style: 'grid', template: 'repeat(2, 1fr)', gap: 6 },
        { count: 8, style: 'grid', template: 'repeat(4, 1fr)', gap: 5 },
        { count: 9, style: 'grid', template: 'repeat(3, 1fr)', gap: 5 }
    ];

    let octopusMorphTimeout = null;
    let octopusGlitchInterval = null;
    let octopusMicroInterval = null;

    function buildOctopusMatrix(colorVariant, cfg) {
        const wrapper = document.createElement('div');
        wrapper.className = 'octopus-matrix';
        wrapper.style.position = 'relative';
        wrapper.style.width = 'fit-content';
        wrapper.style.marginLeft = 'auto';
        wrapper.style.transformOrigin = 'top right';
        wrapper.style.opacity = '1';

        if (cfg.style === 'grid') {
            wrapper.style.display = 'grid';
            wrapper.style.gridTemplateColumns = cfg.template;
            wrapper.style.gap = cfg.gap + 'px';
        } else {
            wrapper.style.display = 'inline-grid';
            wrapper.style.gap = '0px';
        }

        const rot = randInt(-4, 4);
        const scaleRand = rand(0.96, 1.04);
        wrapper.style.transform = `rotate(${rot}deg) scale(${scaleRand})`;

        for (let i = 0; i < cfg.count; i++) {
            const img = document.createElement('img');
            img.src = colorVariant.src;
            img.classList.add('octopus-img', colorVariant.class);
            const individualRot = randInt(-7, 7);
            const individualScale = rand(0.92, 1.05);
            img.style.transform = `rotate(${individualRot}deg) scale(${individualScale})`;
            img.style.transition = 'transform 0.1s';
            wrapper.appendChild(img);
        }

        return wrapper;
    }

    function setStaticOctopus() {
        if (!octopusContainer) return;
        octopusContainer.innerHTML = '';
        const wrapper = buildOctopusMatrix(variants[0], { count: 1, style: 'inline-grid', template: null, gap: 0 });
        wrapper.style.transform = 'rotate(0deg) scale(1)';
        const img = wrapper.querySelector('img');
        if (img) img.style.transform = 'rotate(0deg) scale(1)';
        octopusContainer.appendChild(wrapper);
    }

    function randomizeOctopus() {
        if (!effectsEnabled) return;
        if (!octopusContainer) return;

        const colorVariant = variants[randInt(0, variants.length - 1)];
        const cfg = gridConfigs[randInt(0, gridConfigs.length - 1)];
        const wrapper = buildOctopusMatrix(colorVariant, cfg);

        octopusContainer.style.opacity = '0.7';
        octopusContainer.innerHTML = '';
        octopusContainer.appendChild(wrapper);

        setTimeout(() => { octopusContainer.style.opacity = '1'; }, 60);

        if (effectsEnabled) {
            const flashDiv = document.createElement('div');
            flashDiv.classList.add('flash');
            document.body.appendChild(flashDiv);
            setTimeout(() => flashDiv.remove(), 70);
        }

        setTimeout(() => {
            const imgs = wrapper.querySelectorAll('img');
            imgs.forEach(img => {
                if (Math.random() < 0.6 && effectsEnabled) {
                    const gx = randInt(-4,4);
                    const gy = randInt(-3,3);
                    img.style.transform += ` translate(${gx}px, ${gy}px)`;
                    img.style.filter = `blur(${rand(0,1)}px)`;
                    setTimeout(() => {
                        img.style.transform = img.style.transform.replace(/ translate\([^)]+\)/, '');
                        img.style.filter = '';
                    }, 60);
                }
            });
        }, 20);
    }

    function applyOctopusGlitch() {
        if (!effectsEnabled) return;
        if (!octopusContainer) return;

        const matrixDiv = octopusContainer.querySelector('.octopus-matrix');
        if (!matrixDiv) return;

        const imgs = matrixDiv.querySelectorAll('img');
        if (imgs.length === 0) return;

        const targetImg = imgs[randInt(0, imgs.length - 1)];
        const clone = targetImg.cloneNode(true);

        const layerDiv = document.createElement('div');
        layerDiv.classList.add('glitch-octo-layer');
        layerDiv.appendChild(clone);

        const matrixRect = matrixDiv.getBoundingClientRect();
        const imgRect = targetImg.getBoundingClientRect();

        layerDiv.style.position = 'absolute';
        layerDiv.style.left = (imgRect.left - matrixRect.left) + 'px';
        layerDiv.style.top = (imgRect.top - matrixRect.top) + 'px';
        layerDiv.style.width = targetImg.clientWidth + 'px';
        layerDiv.style.height = targetImg.clientHeight + 'px';

        matrixDiv.appendChild(layerDiv);

        const glitchOps = [
            (ld) => { const sx=randInt(-18,18); const sy=randInt(-8,8); ld.style.transform=`translate(${sx}px,${sy}px)`; ld.style.filter=`hue-rotate(${randInt(-40,40)}deg) saturate(${rand(1.5,3)})`; ld.style.opacity=rand(0.5,0.9); return 40+randInt(20,60); },
            (ld) => { const sk=rand(-15,15); const scX=rand(0.85,1.3); const scY=rand(0.85,1.3); ld.style.transform=`skewX(${sk}deg) scale(${scX},${scY})`; ld.style.filter=`blur(${rand(0.5,2.5)}px) brightness(${rand(0.9,1.5)})`; ld.style.opacity=rand(0.5,0.9); return 45+randInt(20,70); },
            (ld) => { ld.style.filter=`invert(${rand(0.3,0.8)}) contrast(${rand(1.2,2)})`; ld.style.transform=`translate(${randInt(-12,12)}px,${randInt(-10,10)}px) rotate(${randInt(-4,4)}deg)`; ld.style.opacity=rand(0.6,1); return 40+randInt(20,60); },
            (ld) => { const ct=randInt(15,70); const cb=randInt(40,90); ld.style.clipPath=`polygon(0% ${ct}%, 100% ${ct}%, 100% ${cb}%, 0% ${cb}%)`; ld.style.transform=`translateX(${randInt(-25,25)}px)`; ld.style.filter=`contrast(${rand(1.1,1.9)})`; ld.style.opacity=rand(0.5,0.9); return 50+randInt(25,70); },
            (ld) => { ld.style.transform=`scaleX(-1) translateX(${randInt(-20,20)}px) scaleY(${rand(0.8,1.2)})`; ld.style.filter=`drop-shadow(${randInt(-4,4)}px ${randInt(-4,4)}px 2px #00f2ff) blur(${rand(0,1.5)}px)`; ld.style.opacity=rand(0.5,0.85); return 45+randInt(20,65); }
        ];

        const effect = glitchOps[randInt(0, glitchOps.length - 1)];
        const duration = effect(layerDiv);
        const blendModes = ['screen', 'lighten', 'difference', 'exclusion'];
        layerDiv.style.mixBlendMode = blendModes[randInt(0, blendModes.length - 1)];

        setTimeout(() => {
            if (layerDiv.parentNode) layerDiv.remove();
        }, duration);
    }

    function startOctopusMorph() {
        if (octopusMorphTimeout) clearTimeout(octopusMorphTimeout);
        const loop = () => {
            if (effectsEnabled) randomizeOctopus();
            octopusMorphTimeout = setTimeout(loop, randInt(1800, 4200));
        };
        loop();
    }

    function startOctopusGlitchLoop() {
        if (octopusGlitchInterval) clearInterval(octopusGlitchInterval);
        octopusGlitchInterval = setInterval(() => {
            if (effectsEnabled && Math.random() < 0.7) applyOctopusGlitch();
        }, randInt(500, 1200));
    }

    function startOctopusMicro() {
        if (octopusMicroInterval) clearInterval(octopusMicroInterval);
        octopusMicroInterval = setInterval(() => {
            if (!effectsEnabled) return;
            const matrixDiv = octopusContainer?.querySelector('.octopus-matrix');
            if (matrixDiv) {
                const imgs = matrixDiv.querySelectorAll('img');
                if (imgs.length && Math.random() < 0.4) {
                    const idx = randInt(0, imgs.length - 1);
                    const img = imgs[idx];
                    const sx = randInt(-4,4);
                    const sy = randInt(-3,3);
                    img.style.transform += ` translate(${sx}px, ${sy}px)`;
                    img.style.filter = `blur(${rand(0,1)}px)`;
                    setTimeout(() => {
                        img.style.transform = img.style.transform.replace(/ translate\([^)]+\)/, '');
                        img.style.filter = '';
                    }, 70);
                }
            }
        }, 400);
    }

    function startEffects() {
        if (effectsEnabled) return;
        effectsEnabled = true;
        if (glitchTimeout) clearTimeout(glitchTimeout);
        applyRandomGlitch();
        startMicroGlitch();
        startExtraGlitch();
        startOctopusMorph();
        startOctopusGlitchLoop();
        startOctopusMicro();
        randomizeOctopus();

        const fd = document.createElement('div');
        fd.classList.add('flash');
        document.body.appendChild(fd);
        setTimeout(() => fd.remove(), 100);
    }

    function stopEffects() {
        effectsEnabled = false;

        if (glitchTimeout) clearTimeout(glitchTimeout);
        if (microGlitchInterval) clearInterval(microGlitchInterval);
        if (extraGlitchInterval) clearInterval(extraGlitchInterval);
        if (octopusMorphTimeout) clearTimeout(octopusMorphTimeout);
        if (octopusGlitchInterval) clearInterval(octopusGlitchInterval);
        if (octopusMicroInterval) clearInterval(octopusMicroInterval);

        clearAllLayers();
        document.querySelectorAll('.glitch-octo-layer').forEach(l => l.remove());

        setStaticOctopus();

        container.style.filter = '';
        originalLogo.style.transform = '';
        originalLogo.style.filter = '';
    }

    function toggleEffects() {
        if (effectsEnabled) {
            stopEffects();
        } else {
            startEffects();
        }
    }

    function initStatic() {
        setStaticOctopus();

        document.getElementById('toggleEffectsBtn').addEventListener('click', function(e) {
            e.preventDefault();
            e.stopPropagation();
            return false;
        });

        triggerLogo.addEventListener('click', toggleEffects);
        triggerLogo.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                toggleEffects();
            }
        });
    }

    initStatic();
})();
</script>

</body>
</html>
